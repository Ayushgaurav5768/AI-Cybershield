<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>CyberShield Warning</title>
  <style>
    body { margin: 0; font-family: "Segoe UI", sans-serif; background: radial-gradient(circle at top, #7f1d1d, #0f172a 60%); color: #f8fafc; }
    .wrap { max-width: 760px; margin: 10vh auto; background: rgba(15, 23, 42, 0.9); border: 1px solid #ef4444; border-radius: 14px; padding: 24px; }
    h1 { color: #f87171; }
    .actions { display: flex; gap: 12px; margin-top: 18px; }
    button, a { text-decoration: none; border: 0; border-radius: 8px; padding: 10px 14px; font-weight: 700; cursor: pointer; }
    .back { background: #22d3ee; color: #0f172a; }
    .continue { background: #334155; color: #e5e7eb; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Potentially Dangerous Page Blocked</h1>
    <p>CyberShield flagged this site as dangerous. You can go back safely or continue at your own risk.</p>
    <p id="target"></p>
    <div class="actions">
      <button class="back" onclick="history.back()">Go Back</button>
      <a id="continueLink" class="continue" href="#">Continue Anyway</a>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const target = params.get('target') || '';
    document.getElementById('target').textContent = target;
    document.getElementById('continueLink').href = target;
  </script>
</body>
</html>
