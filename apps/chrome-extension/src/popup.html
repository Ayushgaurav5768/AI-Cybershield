<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>CyberShield</title>
  <style>
    body {
      width: 360px;
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(160deg, #0b1220, #111827);
      color: #e5e7eb;
      padding: 16px;
    }
    .card {
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .status { font-size: 20px; font-weight: 700; margin: 6px 0; }
    .safe { color: #22c55e; }
    .suspicious { color: #f59e0b; }
    .dangerous { color: #ef4444; }
    button {
      width: 100%;
      margin-top: 8px;
      border: 0;
      border-radius: 8px;
      padding: 10px;
      font-weight: 600;
      cursor: pointer;
    }
    .primary { background: #22d3ee; color: #0f172a; }
    .warn { background: #f59e0b; color: #0f172a; }
    .neutral { background: #334155; color: #e5e7eb; }
    .mini { font-size: 12px; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="mini">Current Site</div>
    <div id="urlLabel" class="mini"></div>
    <div id="riskLevel" class="status">Not scanned</div>
    <div id="scoreLabel" class="mini">Risk: -- / 100</div>
    <div id="summary" class="mini" style="margin-top:8px;"></div>
    <button id="scanBtn" class="primary">Scan Current Tab</button>
  </div>

  <div class="card">
    <div class="mini">Actions</div>
    <button id="reportBtn" class="warn">Report This Site</button>
    <button id="trustBtn" class="neutral">Trust / Allowlist Site</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
